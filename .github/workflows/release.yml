name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: macos

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.88.0"

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install system dependencies (Linux)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libusb-1.0-0-dev

      - name: Install system dependencies (macOS)
        if: matrix.platform == 'macos'
        run: brew install libusb

      - name: Cache Cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            node-${{ runner.os }}-

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          # Patch tauri.conf.json
          sed -i.bak "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" src-tauri/tauri.conf.json
          # Patch Cargo.toml (only the package version, not dependency versions)
          sed -i.bak "0,/^version = \".*\"/s//version = \"$VERSION\"/" src-tauri/Cargo.toml
          # Patch package.json
          sed -i.bak "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" package.json
          echo "Set version to $VERSION"

      - name: Install npm dependencies
        run: npm ci

      - name: Run Rust tests
        working-directory: src-tauri
        run: cargo test

      - name: Run frontend type check
        run: npm run check

      - name: Build release
        run: npm run build:release

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.platform }}
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*

  update-homebrew:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Wait for release assets to propagate
        run: sleep 10

      - name: Download macOS DMG and compute SHA256
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DMG_URL="https://github.com/onemorepereira/training-app/releases/download/v${VERSION}/training-app_${VERSION}_aarch64.dmg"
          curl -sL "$DMG_URL" -o training-app.dmg
          SHA256=$(shasum -a 256 training-app.dmg | awk '{print $1}')
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "SHA256=$SHA256" >> "$GITHUB_ENV"

      - name: Update Homebrew cask
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git clone "https://github.com/onemorepereira/homebrew-training-app.git" tap
          cd tap
          git config http.https://github.com/.extraheader "Authorization: basic $(echo -n "x-access-token:${GH_TOKEN}" | base64)"

          cat > Casks/training-app.rb << RUBY
          cask "training-app" do
            version "${VERSION}"
            sha256 "${SHA256}"

            url "https://github.com/onemorepereira/training-app/releases/download/v#{version}/training-app_#{version}_aarch64.dmg"
            name "Training App"
            desc "A cycling training application"
            homepage "https://github.com/onemorepereira/training-app"

            app "training-app.app"
          end
          RUBY

          # Remove heredoc indentation
          sed -i 's/^          //' Casks/training-app.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/training-app.rb
          git commit -m "Update training-app to ${VERSION}"
          git push
